<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Project Status</title>
<style>
  :root{
    --bg:#0f1420; --panel:#171d2b; --panel2:#1e2636; --line:#2a3346;
    --ink:#e7ecf3; --muted:#93a0b4; --faint:#66738a;
    --green:#37d399; --amber:#f5b342; --blue:#5aa9ff; --red:#ff6b6b; --purple:#b98bff;
    --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#0f1420,#0c1019);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;line-height:1.5;
    -webkit-font-smoothing:antialiased;padding:32px 20px 64px}
  .wrap{max-width:1120px;margin:0 auto}
  header.top{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;margin-bottom:6px}
  h1{font-size:26px;margin:0;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13px;margin:0 0 26px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:0 0 26px;font-size:12px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 20px 18px;
    box-shadow:var(--shadow);position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent,var(--faint))}
  .card h2{font-size:17px;margin:0 0 2px;display:flex;align-items:center;gap:9px}
  .pill{font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;letter-spacing:.02em;
    background:color-mix(in srgb,var(--accent) 18%,transparent);color:var(--accent);white-space:nowrap}
  .updated{color:var(--faint);font-size:11.5px;margin:0 0 14px}
  .bar{height:7px;border-radius:6px;background:var(--panel2);overflow:hidden;margin:2px 0 4px}
  .bar>i{display:block;height:100%;background:var(--accent);border-radius:6px}
  .pct{font-size:11.5px;color:var(--muted);margin:0 0 16px;text-align:right}
  .next{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin:0 0 15px}
  .next .lbl{font-size:10.5px;font-weight:700;letter-spacing:.09em;color:var(--accent);text-transform:uppercase;margin:0 0 3px}
  .next .txt{font-size:14px;margin:0}
  .seclbl{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;margin:14px 0 7px}
  ul.open{list-style:none;margin:0;padding:0;font-size:13px}
  ul.open li{padding:3px 0 3px 18px;position:relative;color:var(--ink)}
  ul.open li::before{content:"›";position:absolute;left:2px;color:var(--amber);font-weight:700}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .chip{font-size:11.5px;background:color-mix(in srgb,var(--green) 12%,transparent);
    color:var(--green);border:1px solid color-mix(in srgb,var(--green) 30%,transparent);
    padding:3px 9px;border-radius:7px}
  .card a.link{display:inline-block;margin-top:14px;font-size:12px;color:var(--blue);text-decoration:none}
  .card a.link:hover{text-decoration:underline}
  footer{color:var(--faint);font-size:12px;margin-top:34px;text-align:center}
  /* status accents */
  .s-ontrack{--accent:var(--green)} .s-blocked{--accent:var(--red)}
  .s-paused{--accent:var(--amber)} .s-shipped{--accent:var(--blue)} .s-planning{--accent:var(--purple)}
</style>
</head>
<body>
<div class="wrap">
  <header class="top"><h1>📋 Project Status</h1></header>
  <p class="sub" id="sub">—</p>

  <div class="legend">
    <span><i class="dot" style="background:var(--green)"></i>On track</span>
    <span><i class="dot" style="background:var(--red)"></i>Blocked</span>
    <span><i class="dot" style="background:var(--amber)"></i>Paused</span>
    <span><i class="dot" style="background:var(--blue)"></i>Shipped / idle</span>
    <span><i class="dot" style="background:var(--purple)"></i>Planning</span>
  </div>

  <div class="grid" id="grid"></div>
  <footer id="foot"></footer>
</div>

<script>
/* ─────────────────────────────────────────────────────────────────────────
   EDIT HERE to update the board. One object per project. That's the whole API.
   status: "ontrack" | "blocked" | "paused" | "shipped" | "planning"
   To add a project, copy a block and change the fields.
   ───────────────────────────────────────────────────────────────────────── */
const LAST_REFRESH = "2026-07-02";

const PROJECTS = [
  {
    name: "Menu-OCR Pipeline",
    status: "ontrack",
    progress: 80,
    updated: "2026-07-02",
    next: "Lower OCR cost per photo, then scale coverage to more countries and platforms.",
    open: [
      "Reduce OCR cost per photo",
      "Expand to more data sources / platforms",
      "Onboard more countries"
    ],
    shipped: [
      "UK live",
      "Native prices + currency",
      "Source photo links",
      "Specialty-beer coverage (NL)"
    ],
    link: ""   // optional: repo or docs URL
  },

  /* ── template — copy for a new project ──
  {
    name: "Project name",
    status: "planning",
    progress: 0,
    updated: "2026-07-02",
    next: "The one next thing.",
    open: ["…"],
    shipped: [],
    link: ""
  },
  */
];

/* ── renderer (no need to edit below) ── */
const LABEL = {ontrack:"On track", blocked:"Blocked", paused:"Paused", shipped:"Shipped", planning:"Planning"};
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function card(p){
  const chips = (p.shipped||[]).map(s=>`<span class="chip">✓ ${esc(s)}</span>`).join("");
  const open  = (p.open||[]).map(o=>`<li>${esc(o)}</li>`).join("");
  return `<article class="card s-${p.status}">
    <h2>${esc(p.name)} <span class="pill">${LABEL[p.status]||p.status}</span></h2>
    <p class="updated">updated ${esc(p.updated||"—")}</p>
    <div class="bar"><i style="width:${Math.max(0,Math.min(100,p.progress||0))}%"></i></div>
    <p class="pct">${p.progress||0}%</p>
    <div class="next"><p class="lbl">Next</p><p class="txt">${esc(p.next||"—")}</p></div>
    ${open ? `<p class="seclbl">In flight / open</p><ul class="open">${open}</ul>` : ""}
    ${chips ? `<p class="seclbl">Recently shipped</p><div class="chips">${chips}</div>` : ""}
    ${p.link ? `<a class="link" href="${esc(p.link)}">Open project →</a>` : ""}
  </article>`;
}

document.getElementById("grid").innerHTML = PROJECTS.map(card).join("");
document.getElementById("sub").textContent =
  `${PROJECTS.length} project${PROJECTS.length===1?"":"s"} · last refreshed ${LAST_REFRESH}`;
document.getElementById("foot").textContent =
  "Maintained by Claude · refreshed at the end of each work session. If it looks stale, ask for a refresh.";
</script>
</body>
</html>
